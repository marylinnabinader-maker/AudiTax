<head>

<style>
:root{
  --bg:#0f1420; --panel:#171d2e; --panel2:#1e2740; --line:#2a3350;
  --txt:#e8ecf5; --muted:#93a0bd; --accent:#4f8cff; --accent2:#22d3a6;
  --warn:#f7b955; --bad:#ff6b6b; --good:#22c55e; --purple:#a78bfa;
  --shadow:0 6px 20px rgba(0,0,0,.35);
  --headerbg:linear-gradient(90deg,#141b2d,#1b2540);
}
[data-theme="light"]{
  --bg:#f3f6fc; --panel:#ffffff; --panel2:#eef2f9; --line:#dde3ee;
  --txt:#1a2233; --muted:#5b6780; --accent:#2f6bff; --accent2:#0fb892;
  --warn:#e08a15; --bad:#e23b3b; --good:#16a34a; --purple:#7c5cf0;
  --shadow:0 4px 16px rgba(30,50,90,.10);
  --headerbg:linear-gradient(90deg,#ffffff,#eaf0fb);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;font-size:13px}
a{color:var(--accent)}
.header{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 22px;background:var(--headerbg);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px;color:#fff}
.header .sub{color:rgba(255,255,255,.82);font-size:11.5px;margin-top:2px}
.header .chip{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.35)}
.header .chip:hover{border-color:#fff}
.header .chip.active{background:#fff;color:#111;border-color:#fff;font-weight:600}
.header .btn,.header .dd-btn{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.35)}
.header .btn:hover,.header .dd-btn:hover{border-color:#fff}
.header .badge{background:rgba(255,255,255,.22);color:#fff}
.logo{display:flex;align-items:center;gap:12px}
.logo .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#06121f}
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:20px;
  padding:5px 12px;cursor:pointer;font-size:12px;user-select:none;transition:.15s}
.chip:hover{border-color:var(--accent)}
.chip.active{background:var(--accent);color:#06121f;border-color:var(--accent);font-weight:600}
.dd{position:relative}
.dd-btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
  padding:7px 12px;cursor:pointer;font-size:12px;display:flex;gap:8px;align-items:center}
.dd-menu{position:absolute;right:0;top:110%;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:8px;min-width:220px;max-height:320px;overflow:auto;display:none;z-index:60;box-shadow:var(--shadow)}
.dd-menu.open{display:block}
.dd-menu label{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:pointer;font-size:12px}
.dd-menu label:hover{background:var(--panel2)}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px}
.btn:hover{border-color:var(--accent)}
.tabs{display:flex;gap:4px;padding:10px 22px 0;background:var(--bg);flex-wrap:wrap;position:sticky;top:62px;z-index:40;border-bottom:1px solid var(--line)}
.tab{padding:9px 16px;cursor:pointer;color:var(--muted);border-radius:8px 8px 0 0;font-weight:600;font-size:13px;border:1px solid transparent;border-bottom:none}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--txt);background:var(--panel);border-color:var(--line)}
.wrap{padding:18px 22px 60px}
.page{display:none}
.page.active{display:block}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}
.kpi .val{font-size:24px;font-weight:800;margin-top:6px}
.kpi .delta{font-size:12px;margin-top:4px}
.up{color:var(--good)} .down{color:var(--bad)}
.section-title{font-size:14px;font-weight:700;margin:2px 0 10px;display:flex;align-items:center;gap:8px}
.section-title small{color:var(--muted);font-weight:500;font-size:11px}
.row{display:grid;gap:14px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}
.c4{grid-template-columns:repeat(4,1fr)}
.c23{grid-template-columns:2fr 1fr}
.c32{grid-template-columns:1fr 2fr}
@media(max-width:1100px){.c2,.c3,.c4,.c23,.c32{grid-template-columns:1fr}}
.chart-box{position:relative;height:300px}
.chart-box.sm{height:240px}
.chart-box.lg{height:360px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--muted);font-weight:600;cursor:pointer;position:sticky;top:0;background:var(--panel);user-select:none}
th:hover{color:var(--txt)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--panel2)}
.table-wrap{max-height:430px;overflow:auto;border-radius:10px}
.search{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 10px;font-size:12px;width:210px;margin-bottom:8px}
.pill{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.pill.Premium{background:rgba(34,197,94,.18);color:#4ade80}
.pill.Healthy{background:rgba(79,140,255,.18);color:#7fb0ff}
.pill.Thin{background:rgba(247,185,85,.18);color:#f7b955}
.pill.AtRisk{background:rgba(255,107,107,.18);color:#ff8a8a}
.pill.Fast{background:rgba(34,197,94,.18);color:#4ade80}
.pill.Slow{background:rgba(247,185,85,.18);color:#f7b955}
.pill.Dead{background:rgba(255,107,107,.18);color:#ff8a8a}
.pill.Medium{background:rgba(147,160,189,.18);color:#b9c3da}
.note{color:var(--muted);font-size:11px;margin-top:8px;line-height:1.5}
.badge{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;color:var(--muted);font-size:11px}
.mini-stat{display:flex;flex-direction:column;gap:2px}
.mini-stat .v{font-size:20px;font-weight:800}
.mini-stat .k{color:var(--muted);font-size:11px}
.flexwrap{display:flex;gap:12px;flex-wrap:wrap}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#2c3656;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>

function themePalette(){
  return (DATA.theme && DATA.theme.dataColors && DATA.theme.dataColors.length)
    ? DATA.theme.dataColors.slice() : DEFAULT_PALETTE.slice();
}
function applyThemeAttr(){
  const r = document.documentElement;
  if(THEME==='dark') r.removeAttribute('data-theme');
  else r.setAttribute('data-theme', THEME);
  const b = document.getElementById('themeBtn'); if(b) b.textContent = THEME_LABEL[THEME];
}
function computeColors(){
  const r = document.documentElement;
  const th = DATA.theme || {};
  // both themes follow the palette from the theme JSON
  PALETTE = themePalette();
  const good = th.maximum || '#22c55e';
  const bad  = th.minimum || '#ff6b6b';
  // drive UI accent colors from the palette (in both dark & light)
  r.style.setProperty('--accent',  PALETTE[0]);
  r.style.setProperty('--accent2', PALETTE[4] || PALETTE[1] || PALETTE[0]);
  r.style.setProperty('--good', good);
  r.style.setProperty('--bad', bad);
  r.style.setProperty('--headerbg', `linear-gradient(90deg, ${PALETTE[1]||PALETTE[0]}, ${PALETTE[0]})`);
  const cs = getComputedStyle(r);
  C.panel = cs.getPropertyValue('--panel').trim() || '#171d2e';
  SEM = {good:good, bad:bad, warn:(PALETTE[2]||'#f7b955'), info:(PALETTE[5]||PALETTE[3]||'#4f8cff')};
  if(THEME==='light'){ C.grid='rgba(150,162,186,.35)'; C.bar2025='#c4cddf'; }
  else{ C.grid='rgba(42,51,80,.5)'; C.bar2025='#3a4a6b'; }
  Chart.defaults.font.family='Segoe UI, system-ui, sans-serif';
  A1=PALETTE[0]||'#4f8cff'; A2=PALETTE[1]||'#22d3a6'; A3=PALETTE[2]||'#f7b955'; A4=PALETTE[3]||'#a78bfa';
  gridCfg = {grid:{color:C.grid}, ticks:{}};
  Chart.defaults.color = cs.getPropertyValue('--muted').trim();
  Chart.defaults.borderColor = C.grid;
}

const fmtNum = n => (n==null?'—':n.toLocaleString('en-US',{maximumFractionDigits:0}));
const fmtUSD = n => (n==null?'—':'$'+n.toLocaleString('en-US',{maximumFractionDigits:0}));
const fmtUSD2 = n => (n==null?'—':'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}));
const fmtPct = n => (n==null?'—':n.toFixed(1)+'%');

function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}

/* ============================ filtering / aggregation ============================ */
function filteredLines(){
  const cats = FILTER.cats;
  const months = FILTER.months;
  return DATA.lines2026.filter(r =>
    (cats.size===0 || cats.has(r.cat)) && months.has(r.m));
}

function computeAgg(lines){
  const a = {rev:0,gp:0,qty:0, refs:new Set(),
             byMonth:{}, byCat:{}, byItem:{}, byCust:{}, byMonthProfit:{}, byMonthQty:{}};
  for(const r of lines){
    a.rev += r.sales; a.gp += r.profit; a.qty += r.qty; a.refs.add(r.ref);
    a.byMonth[r.m] = (a.byMonth[r.m]||0)+r.sales;
    a.byMonthProfit[r.m] = (a.byMonthProfit[r.m]||0)+r.profit;
    a.byMonthQty[r.m] = (a.byMonthQty[r.m]||0)+r.qty;
    const c = a.byCat[r.cat] || (a.byCat[r.cat]={sales:0,profit:0,qty:0});
    c.sales+=r.sales; c.profit+=r.profit; c.qty+=r.qty;
    const it = a.byItem[r.item] || (a.byItem[r.item]={item:r.item,cat:r.cat,sales:0,profit:0,qty:0});
    it.sales+=r.sales; it.profit+=r.profit; it.qty+=r.qty;
    const cu = a.byCust[r.cust] || (a.byCust[r.cust]={cust:r.cust,sales:0,profit:0,qty:0,refs:new Set()});
    cu.sales+=r.sales; cu.profit+=r.profit; cu.qty+=r.qty; cu.refs.add(r.ref);
  }
  a.invoices = a.refs.size;
  a.gpm = a.rev? a.gp/a.rev*100 : 0;
  a.items = Object.values(a.byItem).map(x=>({...x, margin:x.sales?x.profit/x.sales*100:0, avgprice:x.qty?x.sales/x.qty:0}));
  a.custs = Object.values(a.byCust).map(x=>({cust:x.cust,sales:x.sales,profit:x.profit,qty:x.qty,
                          invoices:x.refs.size, margin:x.sales?x.profit/x.sales*100:0}));
  a.cats = Object.entries(a.byCat).map(([k,v])=>({cat:k,sales:v.sales,profit:v.profit,qty:v.qty,margin:v.sales?v.profit/v.sales*100:0}))
                 .sort((x,y)=>y.sales-x.sales);
  return a;
}

/* ============================ table builder ============================ */
function buildTable(container, cols, rows, opts={}){
  opts = Object.assign({search:true, maxRows:null, sortCol:null, sortDir:-1}, opts);
  const wrapId = 'tbl_'+Math.random().toString(36).slice(2,8);
  let state = {sortCol:opts.sortCol, dir:opts.sortDir, q:''};
  const root = el(`<div>${opts.search?`<input class="search" placeholder="Search…">`:''}<div class="table-wrap"><table><thead></thead><tbody></tbody></table></div></div>`);
  const thead = root.querySelector('thead'), tbody = root.querySelector('tbody');
  const tr = document.createElement('tr');
  cols.forEach((c,i)=>{
    const th = el(`<th class="${c.num?'num':''}">${c.label}</th>`);
    th.onclick=()=>{ state.dir = (state.sortCol===c.key)? -state.dir : (c.num?-1:1); state.sortCol=c.key; render(); };
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  function render(){
    let data = rows.slice();
    if(state.q){const q=state.q.toLowerCase(); data=data.filter(r=>cols.some(c=>String(r[c.key]??'').toLowerCase().includes(q)));}
    if(state.sortCol){const c=cols.find(x=>x.key===state.sortCol);
      data.sort((a,b)=>{let x=a[state.sortCol],y=b[state.sortCol];
        if(c.num){x=+x||0;y=+y||0;return (x-y)*state.dir;}
        return String(x).localeCompare(String(y))*state.dir;});}
    if(opts.maxRows) data=data.slice(0,opts.maxRows);
    tbody.innerHTML='';
    for(const r of data){
      const trr=document.createElement('tr');
      cols.forEach(c=>{
        const v = c.fmt? c.fmt(r[c.key],r) : (r[c.key]??'');
        trr.appendChild(el(`<td class="${c.num?'num':''}">${v}</td>`));
      });
      tbody.appendChild(trr);
    }
  }
  const s=root.querySelector('.search'); if(s) s.oninput=e=>{state.q=e.target.value;render();};
  render();
  container.appendChild(root);
}

  document.getElementById('prCount').textContent=`${A.items.length} items`;

    {key:'item',label:'Item'},{key:'cat',label:'Category'},

    {key:'profit',label:'Gross Profit',num:true,fmt:fmtUSD},{key:'margin',label:'Margin %',num:true,fmt:fmtPct},
